---
- name: Update Prometheus config with nginx targets
  hosts: prometheus
  become: yes
  tasks:
    - name: Update prometheus.yml
      copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          scrape_configs:
            - job_name: 'node'
              static_configs:
                - targets: ['192.168.20.34:9100', '192.168.21.31:9100']

            - job_name: 'nginx'
              static_configs:
                - targets: ['192.168.20.34:4040', '192.168.21.31:4040']

    - name: Restart Prometheus
      systemd:
        name: prometheus
        state: restarted
