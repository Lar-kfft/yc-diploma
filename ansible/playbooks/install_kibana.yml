---
- name: Install Kibana with docker-compose
  hosts: kibana
  become: yes
  tasks:
    - name: Install docker-compose
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-Linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Create kibana directory
      file:
        path: /opt/kibana
        state: directory

    - name: Create docker-compose.yml
      copy:
        dest: /opt/kibana/docker-compose.yml
        content: |
          version: '3'
          services:
            kibana:
              image: docker.elastic.co/kibana/kibana:8.11.0
              container_name: kibana
              restart: always
              ports:
                - "5601:5601"
              environment:
                - ELASTICSEARCH_HOSTS=http://192.168.20.26:9200
                - XPACK_SECURITY_ENABLED=false

    - name: Start Kibana with docker-compose
      shell: |
        cd /opt/kibana
        docker-compose up -d
